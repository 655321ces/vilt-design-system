<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .b{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--vilt-magenta-100);border:1px solid var(--vilt-magenta-300);border-radius:6px}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .nm{font-family:var(--font-sans);font-size:11px;font-weight:600;color:var(--fg-1)}
</style></head>
<body>
  <div class="row">
    <div class="b"><div class="box" style="width:4px;height:4px"></div><div class="nm">1</div><div class="lab">4px</div></div>
    <div class="b"><div class="box" style="width:8px;height:8px"></div><div class="nm">2</div><div class="lab">8px</div></div>
    <div class="b"><div class="box" style="width:12px;height:12px"></div><div class="nm">3</div><div class="lab">12px</div></div>
    <div class="b"><div class="box" style="width:16px;height:16px"></div><div class="nm">4</div><div class="lab">16px</div></div>
    <div class="b"><div class="box" style="width:24px;height:24px"></div><div class="nm">5</div><div class="lab">24px</div></div>
    <div class="b"><div class="box" style="width:32px;height:32px"></div><div class="nm">6</div><div class="lab">32px</div></div>
    <div class="b"><div class="box" style="width:48px;height:48px"></div><div class="nm">7</div><div class="lab">48px</div></div>
    <div class="b"><div class="box" style="width:64px;height:64px"></div><div class="nm">8</div><div class="lab">64px</div></div>
    <div class="b"><div class="box" style="width:96px;height:96px"></div><div class="nm">9</div><div class="lab">96px</div></div>
  </div>
</body></html>
