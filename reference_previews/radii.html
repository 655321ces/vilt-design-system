<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg)}
  .row{display:flex;gap:18px;align-items:center}
  .b{flex:1;background:var(--vilt-navy);height:84px}
  .b .inner{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:600}
  .lab{font-family:var(--font-sans);font-size:11px;color:var(--fg-3);text-align:center;margin-top:6px}
</style></head>
<body>
  <div class="row">
    <div><div class="b" style="border-radius:4px"><div class="inner">4px</div></div><div class="lab">--r-sm</div></div>
    <div><div class="b" style="border-radius:8px"><div class="inner">8px</div></div><div class="lab">--r-md</div></div>
    <div><div class="b" style="border-radius:14px"><div class="inner">14px</div></div><div class="lab">--r-lg</div></div>
    <div><div class="b" style="border-radius:24px"><div class="inner">24px</div></div><div class="lab">--r-xl</div></div>
    <div><div class="b" style="border-radius:32px"><div class="inner">32px</div></div><div class="lab">--r-2xl</div></div>
    <div><div class="b" style="border-radius:999px"><div class="inner">pill</div></div><div class="lab">--r-pill</div></div>
  </div>
</body></html>
