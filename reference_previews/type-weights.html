<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end}
  .w{display:flex;flex-direction:column;gap:6px}
  .glyph{font-family:var(--font-sans);font-size:54px;color:var(--fg-1);line-height:1;letter-spacing:-.02em}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="grid">
    <div class="w"><div class="glyph" style="font-weight:300">Aa</div><div class="lab">Light · 300</div></div>
    <div class="w"><div class="glyph" style="font-weight:400">Aa</div><div class="lab">Regular · 400</div></div>
    <div class="w"><div class="glyph" style="font-weight:600">Aa</div><div class="lab">Semibold · 600</div></div>
    <div class="w"><div class="glyph" style="font-weight:700">Aa</div><div class="lab">Bold · 700</div></div>
    <div class="w"><div class="glyph" style="font-weight:800">Aa</div><div class="lab">Black · 800</div></div>
  </div>
</body></html>
