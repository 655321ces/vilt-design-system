<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-alt);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#fff;border-radius:14px;padding:22px;box-shadow:var(--shadow-1);transition:transform 250ms,box-shadow 250ms}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
  .card .icon{width:44px;height:44px;border-radius:12px;background:var(--grad-warm);margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:18px;font-weight:700;color:var(--fg-1);letter-spacing:-.01em}
  .card p{margin:0;font-size:13px;color:var(--fg-2);line-height:1.55}
  .card .more{margin-top:14px;font-size:13px;font-weight:600;color:var(--vilt-magenta)}
</style></head>
<body>
  <div class="card">
    <div class="icon"></div>
    <h3>Excelência orientada para as pessoas</h3>
    <p>Reconhecemos o verdadeiro valor de nossos funcionários e clientes em cada decisão.</p>
    <div class="more">Saiba mais →</div>
  </div>
  <div class="card">
    <div class="icon" style="background:var(--grad-violet)"></div>
    <h3>Liderança transparente</h3>
    <p>Comunicação aberta e objetivos claros em cada etapa da jornada.</p>
    <div class="more">Saiba mais →</div>
  </div>
</body></html>
