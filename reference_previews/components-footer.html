<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--vilt-navy-700);color:#fff;font-family:var(--font-sans);overflow:hidden}
  .pad{padding:32px 36px;display:flex;flex-direction:column;gap:14px}
  .top{display:flex;align-items:flex-start;gap:24px}
  .logo{font-weight:800;font-size:22px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .v{width:18px;height:18px;background:var(--vilt-magenta);clip-path:polygon(0 0,100% 0,50% 100%)}
  .blurb{font-size:13px;line-height:1.55;opacity:.85;max-width:560px}
  .links{display:flex;gap:18px;font-size:12px;opacity:.75;flex-wrap:wrap}
  .links a{color:#fff}
  .strip{height:6px;background:var(--grad-mix);border-radius:3px}
</style></head>
<body>
  <div class="pad">
    <div class="strip"></div>
    <div class="top">
      <div class="logo"><img src="../assets/vilt-logo-163x50.png" alt="VILT" style="height:32px;filter:brightness(0) invert(1)"></div>
      <p class="blurb">A VILT é líder global na criação de experiências excepcionais para clientes e funcionários, impulsionada por uma cultura que coloca as pessoas em primeiro lugar.</p>
    </div>
    <div class="links"><a>Política de privacidade</a><a>Aviso Legal</a><a>Política de cookies</a><a>Newsletter</a><a>VILT is part of Tessi Group</a></div>
  </div>
</body></html>
