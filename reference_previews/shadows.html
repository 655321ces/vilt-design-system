<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-alt)}
  .row{display:flex;gap:24px}
  .c{flex:1;background:#fff;height:96px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--fg-2);font-family:var(--font-mono);font-size:12px;font-weight:600}
  .l{margin-top:8px;font-family:var(--font-sans);font-size:11px;color:var(--fg-3);text-align:center}
</style></head>
<body>
  <div class="row">
    <div style="flex:1"><div class="c" style="box-shadow:var(--shadow-1)">shadow-1</div><div class="l">subtle · cards at rest</div></div>
    <div style="flex:1"><div class="c" style="box-shadow:var(--shadow-2)">shadow-2</div><div class="l">cards on hover</div></div>
    <div style="flex:1"><div class="c" style="box-shadow:var(--shadow-3)">shadow-3</div><div class="l">overlays · menus</div></div>
    <div style="flex:1"><div class="c" style="box-shadow:var(--shadow-violet)">shadow-violet</div><div class="l">brand glow</div></div>
  </div>
</body></html>
