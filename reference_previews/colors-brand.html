<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:14px;align-items:stretch}
  .sw{flex:1;border-radius:var(--r-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.02em;box-shadow:var(--shadow-1)}
  .sw .nm{font-family:var(--font-sans);font-size:13px;font-weight:700;margin-bottom:2px;letter-spacing:0}
  .dark{color:#2C3848}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#E81464"><div class="nm">Magenta</div>#E81464</div>
    <div class="sw" style="background:#C8104F"><div class="nm">Magenta 600</div>#C8104F</div>
    <div class="sw" style="background:#F26A99"><div class="nm">Magenta 300</div>#F26A99</div>
    <div class="sw dark" style="background:#FCE0EB"><div class="nm">Magenta 100</div>#FCE0EB</div>
    <div class="sw" style="background:#2C3848"><div class="nm">Navy</div>#2C3848</div>
    <div class="sw" style="background:#1E2733"><div class="nm">Navy 700</div>#1E2733</div>
    <div class="sw" style="background:#5A6878"><div class="nm">Navy 400</div>#5A6878</div>
    <div class="sw dark" style="background:#E5E8ED"><div class="nm">Navy 100</div>#E5E8ED</div>
  </div>
</body></html>
