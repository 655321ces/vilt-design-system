<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--bg)}
  nav{display:flex;align-items:center;gap:28px;padding:18px 28px;background:#fff;border-bottom:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-weight:800;font-size:22px;letter-spacing:-.02em;color:var(--fg-1)}
  .logo .v{display:inline-block;width:18px;height:18px;background:var(--vilt-magenta);clip-path:polygon(0 0,100% 0,50% 100%);}
  .links{display:flex;gap:24px}
  .links a{font-family:var(--font-sans);font-size:14px;font-weight:500;color:var(--fg-1);text-decoration:none}
  .links a:hover{color:var(--vilt-magenta)}
  .right{margin-left:auto;display:flex;gap:12px;align-items:center}
  .lang{font-family:var(--font-sans);font-size:13px;color:var(--fg-2);display:flex;align-items:center;gap:4px}
  .cta{font-family:var(--font-sans);font-weight:600;font-size:13px;background:var(--vilt-magenta);color:#fff;padding:10px 18px;border-radius:999px}
</style></head>
<body>
  <nav>
    <div class="logo"><img src="../assets/vilt-logo-163x50.png" alt="VILT" style="height:32px;width:auto"></div>
    <div class="links">
      <a>O que fazemos</a><a>Verticais</a><a>Insights</a><a>Sobre nós</a>
    </div>
    <div class="right">
      <span class="lang">português - BR ▾</span>
      <a class="cta">Entre em contato</a>
    </div>
  </nav>
</body></html>
