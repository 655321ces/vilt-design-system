<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;font-family:var(--font-mono);font-size:11px;font-weight:600;box-shadow:var(--shadow-1);border:1px solid var(--border)}
  .sw .nm{font-family:var(--font-sans);font-size:13px;font-weight:700;margin-bottom:2px}
  .light{color:#fff;border:0}
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:#1A1A1A"><div class="nm">Ink</div>#1A1A1A</div>
    <div class="sw light" style="background:#2E2E33"><div class="nm">Graphite</div>#2E2E33</div>
    <div class="sw light" style="background:#5A5A63"><div class="nm">Slate</div>#5A5A63</div>
    <div class="sw" style="background:#9A9AA3;color:#fff;border:0"><div class="nm">Silver</div>#9A9AA3</div>
    <div class="sw" style="background:#D6D6DC"><div class="nm">Mist</div>#D6D6DC</div>
    <div class="sw" style="background:#EFEFF2"><div class="nm">Fog</div>#EFEFF2</div>
    <div class="sw" style="background:#F7F7F9"><div class="nm">Cloud</div>#F7F7F9</div>
    <div class="sw" style="background:#FFFFFF"><div class="nm">Paper</div>#FFFFFF</div>
  </div>
</body></html>
