<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-sans);font-weight:600;font-size:14px;padding:14px 24px;border-radius:999px;border:0;cursor:pointer;transition:all 250ms cubic-bezier(.22,1,.36,1);display:inline-flex;align-items:center;gap:8px}
  .btn.primary{background:#E81464;color:#fff}
  .btn.primary:hover{background:#C8104F}
  .btn.secondary{background:transparent;color:#2C3848;border:1.5px solid #2C3848}
  .btn.secondary:hover{background:#2C3848;color:#fff}
  .btn.ghost{background:transparent;color:#2C3848;padding-left:0;padding-right:0}
  .btn.ghost:hover{color:#E81464}
  .btn.dark{background:#2C3848;color:#fff}
  .btn.dark:hover{background:#1E2733}
  .arrow{font-size:18px;line-height:1}
</style></head>
<body>
  <button class="btn primary">Entre em contato <span class="arrow">→</span></button>
  <button class="btn secondary">Saiba mais</button>
  <button class="btn dark">Vamos iniciar uma conversa</button>
  <button class="btn ghost">conectar agora <span class="arrow">→</span></button>
</body></html>
