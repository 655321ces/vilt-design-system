<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .lockup{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:14px}
  .lockup img{height:40px;width:auto;display:block}
  .light{background:#fff;border:1px solid #E5E8ED}
  .dark{background:#2C3848}
  .dark img{filter:brightness(0) invert(1)}
  .pad{background:#FCE0EB}
</style></head>
<body>
  <div class="lockup light"><img src="../assets/vilt-logo-163x50.png" alt="VILT"></div>
  <div class="lockup dark"><img src="../assets/vilt-logo-163x50.png" alt="VILT"></div>
  <div class="lockup pad"><img src="../assets/vilt-logo-163x50.png" alt="VILT"></div>
</body></html>
