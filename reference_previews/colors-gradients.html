<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .grad{height:140px;border-radius:var(--r-lg);position:relative;color:#fff;font-family:var(--font-sans);padding:14px;display:flex;flex-direction:column;justify-content:flex-end}
  .grad .nm{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .grad .var{font-family:var(--font-mono);font-size:11px;opacity:.85;margin-top:2px}
</style></head>
<body>
  <div class="grid">
    <div class="grad" style="background:var(--grad-magenta)"><div class="nm">Magenta</div><div class="var">--grad-magenta</div></div>
    <div class="grad" style="background:var(--grad-navy)"><div class="nm">Navy</div><div class="var">--grad-navy</div></div>
    <div class="grad" style="background:var(--grad-mix)"><div class="nm">Mix</div><div class="var">--grad-mix · navy→magenta</div></div>
  </div>
</body></html>
