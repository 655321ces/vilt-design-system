<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{font-family:var(--font-sans);font-size:13px;font-weight:600;padding:8px 16px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .chip.solid{background:var(--vilt-magenta);color:#fff}
  .chip.violet{background:var(--vilt-navy-100);color:var(--vilt-navy-700)}
  .chip.outline{background:transparent;border:1.5px solid var(--vilt-navy);color:var(--vilt-navy)}
  .chip.muted{background:var(--vilt-fog);color:var(--fg-1)}
  .eyebrow{font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--vilt-magenta)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--vilt-navy-700);color:#fff;letter-spacing:.04em}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--vilt-magenta)}
</style></head>
<body>
  <span class="eyebrow">DESTAQUES</span>
  <span class="chip solid">Finanças e seguros</span>
  <span class="chip violet">Setor público</span>
  <span class="chip outline">Fabricação</span>
  <span class="chip muted">Utilitários</span>
  <span class="badge"><span class="dot"></span>AI · TX</span>
</body></html>
