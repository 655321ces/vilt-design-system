<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:var(--bg)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .row:last-child{border:0}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:90px;flex-shrink:0;letter-spacing:.04em}
  p{margin:0}
</style></head>
<body>
  <div class="stack">
    <div class="row"><span class="lab">eyebrow · 13/600</span><span class="eyebrow">Destaques</span></div>
    <div class="row"><span class="lab">lead · 18/500</span><p class="lead">Aproveitamento do poder da experiência total e da IA.</p></div>
    <div class="row"><span class="lab">body · 16/400</span><p>Acreditamos no poder das pessoas. Nossa organização é construída sobre a base da valorização de nossos funcionários e clientes acima de tudo.</p></div>
    <div class="row"><span class="lab">small · 14/400</span><small>VILT is part of Tessi Group.</small></div>
  </div>
</body></html>
