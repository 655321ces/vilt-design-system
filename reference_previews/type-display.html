<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:var(--bg)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .row:last-child{border:0}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:90px;flex-shrink:0;letter-spacing:.04em}
</style></head>
<body>
  <div class="stack">
    <div class="row"><span class="lab">hero · 84/800</span><span class="hero" style="font-size:48px">Repense seus negócios</span></div>
    <div class="row"><span class="lab">h1 · 56/800</span><h1 style="margin:0">O futuro é ilimitado</h1></div>
    <div class="row"><span class="lab">h2 · 40/700</span><h2 style="margin:0">Total Experience</h2></div>
    <div class="row"><span class="lab">h3 · 24/600</span><h3 style="margin:0">Customer Experience</h3></div>
  </div>
</body></html>
